<!doctype html>
<html lang="zh-cn">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>算术练习</title>
    <script src="dayjs.min.js"></script>
    <script src="duration.js"></script>
    <script src="vue.global.prod.js"></script>
    <script src="echarts.min.js"></script>
    <script src="arco-vue.min.js"></script>
    <script src="arco-vue-icon.min.js"></script>
    <link rel="stylesheet" href="arco.css" />
    <link rel="stylesheet" href="animate.min.css" />
    <style>
      body {
        font-size: 24px;
      }

      .page-header {
        padding: 20px;
      }

      .page-header h1 {
        font-size: 1.25em;
      }

      .question-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 20px;
      }

      .page-content {
        display: flex;
        flex-direction: column;
        font-size: 30px;
        padding-bottom: 1em;
      }

      .response {
        padding: 2em 0;
        font-size: 1em;
        font-weight: bold;
        vertical-align: middle;
        color: var(--color-neutral-6);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .page-content .arco-input-wrapper .arco-input.arco-input-size-large,
      .arco-btn {
        font-size: 30px;
      }

      .arco-btn {
        padding-top: 1em;
        padding-bottom: 1em;
      }

      .mla {
        margin-left: auto;
      }

      .histories-ol li {
        padding-right: 1em;
        margin-bottom: 0.5em;
      }

      .histories-ol .arco-col {
        text-align: center;
        font-size: 20px;
      }

      .histories-wrapper {
        padding: 0 1em;
      }

      .success {
        color: rgb(var(--green-6));
      }

      .error {
        color: rgb(var(--red-6));
      }

      .time,
      .time .arco-statistic-content .arco-statistic-value {
        color: var(--color-neutral-6);
        font-size: 16px;
        font-weight: normal;
      }

      .time {
        margin-bottom: 1em;
        justify-content: center;
      }

      .arco-input-number .arco-input {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <a-layout>
        <a-layout-header class="page-header">
          <h1 align="center">算术练习</h1>
          <a-space fill style="justify-content: flex-end">
            <a-checkbox-group v-model="operations" @change="next" size="large">
              <a-checkbox
                v-for="operator in OPERATORS"
                :key="operator"
                :value="operator"
                :disabled="isActiveAndOnly(operator)"
              >
                <operator-display :operator="operator"></operator-display>
              </a-checkbox>
            </a-checkbox-group>
            <a-button
              @click="reset"
              size="large"
              :style="{
              fontSize: '14px',
            }"
            >
              重置
            </a-button>
          </a-space>
        </a-layout-header>
        <a-layout-content class="page-content">
          <a-space class="question-wrapper">
            <span>{{question.first}}</span>
            <operator-display :operator="question.operator"></operator-display>
            <span>{{question.second}}</span>
            <span>=</span>
            <span>
              <a-input-number
                ref="input"
                v-model="question.answer"
                hide-button
                @clear="reAnswer"
                @input="(ev) => question.answer = ev.target ? Number(ev.target.value) : ev"
                @keyup.enter="() => question.completed ? next() : answered ? judge() : void 0"
                style="width: 100px"
                size="large"
                pattern="[0-9]*"
                type="tel"
                :readonly="question.completed"
              />
            </span>
            <span v-if="question.showAnswer" style="color: rgb(var(--orange-6))"
              >{{answer}}</span
            >
          </a-space>
          <a-space direction="vertical" fill>
            <template v-if="question.completed">
              <div
                class="response"
                :style="{
                  background: correct ? 'rgb(var(--green-1))' : 'rgb(var(--red-1))',
                  color: correct ? 'rgb(var(--green-6))' : 'rgb(var(--red-6))'
                }"
                @click="handleResponseClick"
              >
                <span class="animate__animated" :class="responseAnimation"
                  >{{response}}</span
                >
              </div>
              <a-space class="time" fill>
                <span>本题用时</span>
                <a-statistic
                  :value="duration / 1000"
                  :precision="2"
                  animation
                  :animation-duration="1000"
                ></a-statistic>
                <span>秒</span>
              </a-space>
              <a-button @click="next" size="large" long type="primary"
                >下一题</a-button
              >
            </template>
            <a-button
              type="primary"
              @click="judge"
              size="large"
              v-else
              :disabled="!answered"
              long
            >
              提交
            </a-button>
            <template v-if="question.completed && !correct">
              <a-button status="success" @click="showAnswer" size="large" long
                >查看答案</a-button
              >
            </template>
          </a-space>
        </a-layout-content>
        <a-layout-footer class="histories-wrapper">
          <div style="font-size: 14px; margin-bottom: 8px">
            已完成 {{histories.length}} 道题目, 其中正确 {{ correctCount }}
            道题, 错误 {{ incorrectCount }} 道题。
          </div>
          <div style="font-size: 14px">
            用时 {{ totalTime.format('m 分 s 秒') }}，平均每道题用时
            {{average.format('s 秒')}}
          </div>
          <ol class="histories-ol">
            <li v-for="(question, index) in histories" :key="index">
              <a-row :gutter="2">
                <a-col :span="3">
                  <span>{{question.first}}</span>
                </a-col>
                <a-col :span="3">
                  <operator-display
                    :operator="question.operator"
                  ></operator-display>
                </a-col>
                <a-col :span="3">
                  <span>{{question.second}}</span>
                </a-col>
                <a-col :span="2">
                  <span>=</span>
                </a-col>
                <a-col :span="4">
                  <span
                    :class="{
                  success: calc(question) === question.answer,
                  error: calc(question) !== question.answer
                }"
                  >
                    {{question.answer}}
                  </span>
                </a-col>
                <a-col :span="9">
                  <div style="text-align: right">
                    <span
                      v-if="calc(question) === question.answer"
                      class="success"
                    >
                      <icon-check-circle />
                    </span>
                    <span v-else class="error">
                      <icon-close-circle />
                    </span>
                  </div>
                </a-col>
              </a-row>
            </li>
          </ol>
          <a-back-top />
        </a-layout-footer>
      </a-layout>
    </div>
    <script type="text/javascript">
      const MAX = 100;
      const OPERATORS = ["+", "-", "*", "/"];
      const CALCULATORS = {
        "+": (a, b) => a + b,
        "-": (a, b) => a - b,
        "*": (a, b) => a * b,
        "/": (a, b) => a / b,
      };
      const LOCAL_STORAGE_KEY = "kid-math-histories";
      const RIGHT_RESPONSES = [
        "😀 太棒了",
        "😍 完美",
        "🥳 你好厉害",
        "🥰 你是最棒的",
        "🐄 太牛了",
        "✌🏻 完全正确",
        "💋 爱你哟",
        "👍🏻 学的真快",
        "😋 你真聪明",
        "☺️ 你真的很能干哦",
        "🐸 你真是个聪明的孩子",
        "🌺 你做的非常好",
        "🌟 你做对了",
        "🤩 进步很大，继续保持",
        "😎 帅呆了",
        "🐮🐮🐮🐮🐮 牛牛牛牛牛",
      ];
      const ERROR_RESPONSES = [
        "😌 不对",
        "😓 再想一想",
        "😤 错误，继续努力",
        "😱 还要加油了",
      ];

      const ANIMATION_CLASSES = [
        "animate__bounce",
        "animate__rubberBand",
        "animate__swing",
        "animate__wobble",
        "animate__heartBeat",
        "animate__bounceInDown",
        "animate__flip",
        "animate__flipInX",
        "animate__flipInY",
        "animate__rotateIn",
        "animate__rollIn",
        "animate__lightSpeedInLeft",
        "animate__lightSpeedInRight",
        "animate__rotateInDownLeft",
        "animate__rotateInDownRight",
        "animate__jackInTheBox",
        "animate__zoomIn",
        "animate__zoomInDown",
        "animate__slideInUp",
      ];

      function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function getRandomElement(arr) {
        return arr[getRandomInt(0, arr.length - 1)];
      }

      function loadHistories() {
        const stored = localStorage.getItem(LOCAL_STORAGE_KEY);
        try {
          return stored ? JSON.parse(stored) : [];
        } catch {
          return [];
        }
      }

      function saveHistories(histories) {
        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(histories));
      }

      function clearHistories() {
        localStorage.removeItem(LOCAL_STORAGE_KEY);
      }

      const { createApp, reactive, computed, onMounted, ref, watch, nextTick } =
        Vue;
      dayjs.extend(dayjs_plugin_duration);
      const sound = window.speechSynthesis;

      const storageHistories = loadHistories();

      const OperatorDisplay = {
        props: ["operator"],
        template: `
          <icon-plus v-if="operator === '+'" />
          <icon-minus v-else-if="operator === '-'" />
          <icon-close v-else-if="operator === '*'" />
          <template v-else-if="operator === '/'">÷</template>
          <template v-else>{{operator}}</template>
        `,
      };

      const app = {
        components: {
          OperatorDisplay,
        },
        setup() {
          const question = reactive({
            first: 0,
            second: 0,
            operator: OPERATORS[0],
            answer: undefined,
            completed: false,
            showAnswer: false,
            operatorSetting: "random",
            begin: null,
            end: null,
          });
          const input = ref();
          const operations = ref([...OPERATORS]);
          const responseAnimation = ref("");

          const histories = reactive(storageHistories);

          const calc = (question) =>
            CALCULATORS[question.operator](question.first, question.second);

          const answer = computed(() => calc(question));

          const answered = computed(() => typeof question.answer === "number");

          const correct = computed(
            () => answered.value && answer.value === Number(question.answer),
          );

          const response = computed(() => {
            if (question.completed && answered.value) {
              const responses = correct.value
                ? RIGHT_RESPONSES
                : ERROR_RESPONSES;
              return getRandomElement(responses);
            }
          });

          const reAnswer = async () => {
            question.answer = undefined;
            question.showAnswer = false;
            question.completed = false;
            question.begin = dayjs().valueOf();
            await nextTick();
            // 安全地尝试聚焦到输入框
            if (input.value) {
              // Arco InputNumber 组件实例可能暴露 focus 方法，或者需要找内部的 input
              if (typeof input.value.focus === "function") {
                input.value.focus();
              } else if (input.value.$el) {
                // 从组件根元素查找内部 input
                const innerInput = input.value.$el.querySelector("input");
                innerInput?.focus?.();
              }
            }
          };

          const getQuestion = () => {
            question.operator =
              question.operatorSetting === "random"
                ? getRandomElement(operations.value)
                : question.operatorSetting;
            if (question.operator === OPERATORS[3]) {
              // 除法：生成两个 1-9 的数，乘积作为被除数
              const a = getRandomInt(1, 9);
              const b = getRandomInt(1, 9);
              question.first = a * b;
              question.second = a;
            } else {
              question.first =
                question.operator === OPERATORS[2]
                  ? getRandomInt(1, 10)
                  : getRandomInt(1, MAX);
              question.second =
                question.operator === OPERATORS[1]
                  ? getRandomInt(0, question.first)
                  : question.operator === OPERATORS[2]
                    ? getRandomInt(0, 9) // 乘法保证乘数范围在 0-9
                    : getRandomInt(1, MAX);
            }
          };

          const judge = () => {
            question.completed = true;
            question.end = dayjs().valueOf();
            histories.push({ ...question });
            saveHistories(histories);
          };

          const next = () => {
            reAnswer();
            getQuestion();
          };

          const showAnswer = () => {
            question.showAnswer = true;
          };

          const reset = () => {
            histories.length = 0;
            clearHistories();
          };

          const getDuration = ({ begin, end }) => end - begin;

          const duration = computed(() => getDuration(question));

          const correctCount = computed(
            () => histories.filter((item) => item.answer === calc(item)).length,
          );
          const incorrectCount = computed(
            () => histories.length - correctCount.value,
          );

          // totalDuration: 总用时，单位毫秒（原始数字，方便计算）
          const totalDuration = computed(() =>
            histories.reduce((prev, curr) => prev + getDuration(curr), 0),
          );
          // totalTime: 包装为 dayjs Duration 对象，方便格式化显示（m 分 s 秒）
          const totalTime = computed(() =>
            dayjs.duration(totalDuration.value, "millisecond"),
          );

          // average: 平均每题用时，包装为 dayjs Duration 对象方便格式化
          const average = computed(() =>
            dayjs.duration(
              histories.length ? totalDuration.value / histories.length : 0,
              "millisecond",
            ),
          );

          const isActiveAndOnly = (value) =>
            operations.value.length <= 1 && operations.value.includes(value);

          const readResponse = () => {
            sound.cancel();
            sound.speak(
              new SpeechSynthesisUtterance(
                response.value.match(/ 牛/)
                  ? response.value.replace(/🐮/g, "牛")
                  : response.value.replace(/^[^ ]*/, ""),
              ),
            );
          };

          const animateResponse = () => {
            responseAnimation.value = getRandomElement(ANIMATION_CLASSES);
          };

          const handleResponseClick = () => {
            animateResponse();
            readResponse();
          };

          onMounted(() => {
            // 暴露到 window 用于调试
            window.__question = question;
            window.__input = input;
            next();
          });

          watch(
            () => question.completed,
            (value) => {
              if (value) {
                animateResponse();
                readResponse();
              }
            },
          );

          return {
            question,
            answer,
            correct,
            response,
            reAnswer,
            getQuestion,
            judge,
            next,
            showAnswer,
            answered,
            input,
            histories,
            calc,
            reset,
            correctCount,
            incorrectCount,
            totalTime,
            duration,
            average,
            operations,
            OPERATORS,
            isActiveAndOnly,
            handleResponseClick,
            responseAnimation,
          };
        },
      };

      createApp(app).use(ArcoVue).use(ArcoVueIcon).mount("#app");
    </script>
  </body>
</html>
